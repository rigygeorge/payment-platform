server:
  port: 8081

spring:
  application:
    name: merchant-service
  datasource:
    url: jdbc:postgresql://localhost:5432/merchant_db
    username: payment_user
    password: payment_pass
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        '[format_sql]': true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

jwt:
  secret: mySecretKeyForJWTTokenGenerationThatIsLongEnough256Bits
  expiration: 86400000  # 24 hours

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    '[com.paymentplatform]': DEBUG
    '[org.springframework.security]': INFO

  